name: Server CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      project_id:
        description: Google Cloud project ID used by gcloud config set project.
        required: true
        default: baymax-492400
      service_name:
        description: Cloud Run service name.
        required: true
        default: baymax-server
      region:
        description: Google Cloud region for the Cloud Run deploy.
        required: true
        default: us-central1
      image_registry:
        description: Container registry prefix used to build the image path.
        required: true
        default: gcr.io
      build_context:
        description: Folder used as the Cloud Build context.
        required: true
        default: server
      node_env:
        description: NODE_ENV passed to Cloud Run.
        required: true
        default: production
      secret_name:
        description: Google Cloud Secret Manager secret name.
        required: true
        default: baymax_server
      secret_path:
        description: Container path where the secret should be mounted.
        required: true
        default: /app/.env/secrets.json
      scheduler_service_account_email:
        description: Service account email used by Cloud Scheduler to invoke Cloud Run.
        required: true
        default: scheduler-invoker@baymax-492400.iam.gserviceaccount.com

permissions:
  contents: read

jobs:
  ci:
    name: Server CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint server
        working-directory: server
        run: npx eslint .

      - name: Build server
        run: npm --prefix server run build

  deploy:
    name: Deploy server to Cloud Run
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: ${{ inputs.project_id }}
      SERVICE_NAME: ${{ inputs.service_name }}
      REGION: ${{ inputs.region }}
      IMAGE: ${{ format('{0}/{1}/{2}', inputs.image_registry, inputs.project_id, inputs.service_name) }}
      SECRET_NAME: ${{ inputs.secret_name }}
      SECRET_PATH: ${{ inputs.secret_path }}
      NODE_ENV: ${{ inputs.node_env }}
      SCHEDULER_SERVICE_ACCOUNT_EMAIL: ${{ inputs.scheduler_service_account_email }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        # Required repository secrets:
        # - GCP_WORKLOAD_IDENTITY_PROVIDER
        # - GCP_SERVICE_ACCOUNT_EMAIL
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ inputs.project_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Configure Google Cloud project
        run: gcloud config set project "$PROJECT_ID"

      - name: Build container image
        working-directory: ${{ inputs.build_context }}
        run: gcloud builds submit --tag "$IMAGE" --quiet

      - name: Deploy to Cloud Run
        run: >-
          gcloud run deploy "$SERVICE_NAME"
          --image "$IMAGE"
          --region "$REGION"
          --platform managed
          --allow-unauthenticated
          --quiet
          --set-env-vars="NODE_ENV=$NODE_ENV"
          --set-secrets="${SECRET_PATH}=${SECRET_NAME}:latest"

      - name: Capture Cloud Run service URL
        id: cloud_run
        run: |
          service_url="$(gcloud run services describe "$SERVICE_NAME" --region "$REGION" --format='value(status.url)')"
          echo "url=$service_url" >> "$GITHUB_OUTPUT"

      - name: Write Terraform variables
        run: |
          cat > "$RUNNER_TEMP/gcp.auto.tfvars" <<EOF
          project_id = "${PROJECT_ID}"
          region = "${REGION}"
          scheduler_service_account_email = "${SCHEDULER_SERVICE_ACCOUNT_EMAIL}"
          cloud_run_base_url = "${{ steps.cloud_run.outputs.url }}"
          EOF

      - name: Apply Terraform for Pub/Sub and Scheduler
        run: |
          terraform -chdir=infra/terraform/gcp init -input=false
          terraform -chdir=infra/terraform/gcp apply -auto-approve -input=false -var-file="$RUNNER_TEMP/gcp.auto.tfvars"
